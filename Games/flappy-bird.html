<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Flappy Block</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            background: #70c5ce;
            border: 3px solid #fff;
        }
    </style>
</head>
<body>
    <h3>Press Spacebar or Click Canvas to Jump</h3>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let birdY = 200, velocity = 0, gravity = 0.4, jump = -6;
        let pipes = [];
        let score = 0;
        let isGameOver = false;

        function reset() {
            birdY = 200; velocity = 0; pipes = []; score = 0; isGameOver = false;
        }

        function addPipe() {
            let gap = 120;
            let topHeight = Math.floor(Math.random() * (canvas.height - gap - 100)) + 50;
            pipes.push({ x: canvas.width, top: topHeight, bottom: canvas.height - topHeight - gap });
        }

        function update() {
            if (isGameOver) return;
            velocity += gravity;
            birdY += velocity;

            if (birdY > canvas.height || birdY < 0) isGameOver = true;
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 150) addPipe();

            pipes.forEach((pipe, index) => {
                pipe.x -= 2;
                if (pipe.x === 50) score++;
                if (pipe.x < -50) pipes.splice(index, 1);

                if (50 + 20 > pipe.x && 50 < pipe.x + 50) {
                    if (birdY < pipe.top || birdY + 20 > canvas.height - pipe.bottom) isGameOver = true;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f1c40f';
            ctx.fillRect(50, birdY, 20, 20);

            ctx.fillStyle = '#2ecc71';
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, 50, pipe.top);
                ctx.fillRect(pipe.x, canvas.height - pipe.bottom, 50, pipe.bottom);
            });

            ctx.fillStyle = '#fff';
            ctx.font = '24px sans-serif';
            ctx.fillText("Score: " + score, 10, 30);

            if (isGameOver) {
                ctx.fillText("Game Over! Click to restart", 60, canvas.height / 2);
            }
        }

        function loop() {
            update(); draw(); requestAnimationFrame(loop);
        }

        function triggerJump() {
            if (isGameOver) reset(); else velocity = jump;
        }

        window.addEventListener('keydown', e => { if (e.code === 'Space') triggerJump(); });
        canvas.addEventListener('click', triggerJump);

        loop();
    </script>
</body>
</html>
