<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Mini Games Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hub-container">
        <header class="hub-header">
            <h1>🎮 Game Hub</h1>
            <p class="subtitle">Your central playground for all mini-games</p>
        </header>

        <div class="hub-layout">
            <aside class="sidebar">
                <h2>Games</h2>
                <ul id="game-list" class="game-list"></ul>
            </aside>

            <main class="game-player">
                <div id="game-container" class="game-container">
                    <div class="welcome-screen" id="welcome-screen">
                        <h2>Welcome to the Game Hub!</h2>
                        <p>Select a game from the sidebar to start playing.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
